<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Super Myelin Bros v10 - The Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  body {
    margin: 0;
    padding: 0;
    background-color: #2a1810;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: white;
    overflow: hidden;
    touch-action: none;
  }

  #game-wrapper {
    position: relative;
    box-shadow: 0 0 0 4px #f4e4c1, 0 0 0 8px #2a1810, 10px 10px 0 8px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 800px;
  }

  canvas {
    background: linear-gradient(to bottom, #0d0420 0%, #2d0e3d 45%, #5a1f54 100%);
    display: block;
    image-rendering: pixelated;
    transition: transform 0.05s;
    width: 100%;
    height: auto;
  }

  #ui-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    text-shadow: 2px 2px 0 #000;
  }

  .stat-box { font-size: 8px; line-height: 1.5; }
  .bro-name { font-size: 10px; margin-bottom: 3px; }

  #game-over {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  h1 { color: #e74c3c; text-shadow: 2px 2px 0 #fff; margin-bottom: 10px; font-size: 16px; }
  p { font-size: 8px; line-height: 2; margin-bottom: 20px; }

  button {
    font-family: 'Press Start 2P', monospace;
    background: #f1c40f;
    border: 3px solid #fff;
    padding: 10px 15px;
    cursor: pointer;
    font-size: 10px;
    text-transform: uppercase;
  }
  button:hover { background: #fff; border-color: #f1c40f; }

  #mobile-controls-overlay {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    box-sizing: border-box;
    font-size: 8px;
    color: rgba(244, 228, 193, 0.5);
    pointer-events: none;
  }

  #power-ui {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    text-shadow: 1px 1px 0 #000;
  }
  #power-name {
    font-size: 7px;
    color: #f1c40f;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  #power-bar {
    width: 110px;
    height: 6px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(244, 228, 193, 0.6);
    box-sizing: border-box;
  }
  #power-bar-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #f1c40f, #f39c12);
    transition: width 0.08s linear;
  }
  #power-bar-fill.charging { background: linear-gradient(90deg, #555, #888); }
  #power-bar-fill.active   { background: linear-gradient(90deg, #2ecc71, #27ae60); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
  #power-hint {
    font-size: 6px;
    color: rgba(244, 228, 193, 0.5);
    margin-top: 3px;
  }
  #power-hint.ready { color: #f1c40f; }
  #muteBtn {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 36px;
    height: 36px;
    padding: 0;
    background: rgba(0,0,0,0.7);
    border: 2px solid #f1c40f;
    color: #f1c40f;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    cursor: pointer;
    border-radius: 0;
    line-height: 32px;
    text-align: center;
    touch-action: manipulation;
    animation: musicPulse 1s infinite alternate;
  }
  #muteBtn.playing { animation: none; }
  #muteBtn.muted {
    color: #777;
    border-color: #777;
    text-decoration: line-through;
    animation: none;
  }
  @keyframes musicPulse {
    from { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.6); }
    to   { box-shadow: 0 0 0 8px rgba(241, 196, 15, 0); }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="ui-layer">
    <div class="stat-box">
      SCORE: <span id="score">000000</span><br>

      CURRENT BRO:<br>
      <div id="current-bro-name" class="bro-name" style="color:#c0392b;">ANTON</div>
      <span id="bro-stats" style="font-size: 8px;">SPD: 5 | JMP: 3</span>
    </div>
  </div>

  <div id="power-ui">
    <div id="power-name">STEROID PULSE</div>

    <p>Final Score: <span id="final-score">0</span></p>
    <button onclick="resetGame()">Try Again</button>
  </div>
